version: "2"
sql:
  - schema: "migrations"
    queries: "db/queries"
    engine: "postgresql"
    gen:
      go:
        package: "queries"
        out: "db/queries"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_prepared_queries: false
        emit_interface: false
        emit_exact_table_names: false
