basePath: /api/v1
definitions:
  internal_handler.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  internal_handler.LoginResponse:
    properties:
      email:
        type: string
      expires_at:
        type: integer
      roles:
        items:
          type: string
        type: array
      token:
        type: string
      user_id:
        type: string
    type: object
  internal_handler.RefreshTokenRequest:
    properties:
      token:
        type: string
    required:
    - token
    type: object
  sprout-backend_internal_domain.CreateAccountRequest:
    properties:
      code:
        type: string
      name:
        type: string
      parent_id:
        type: string
      starting_balance:
        description: 'optional: creates an opening balance journal entry'
        type: number
    required:
    - code
    - name
    - parent_id
    type: object
  sprout-backend_internal_domain.CreateJournalLine:
    properties:
      account_id:
        type: string
      credit:
        type: number
      debit:
        type: number
    required:
    - account_id
    type: object
  sprout-backend_internal_domain.CreateJournalRequest:
    properties:
      date:
        description: YYYY-MM-DD
        type: string
      description:
        type: string
      invoice_id:
        description: optional link to an invoice
        type: string
      lines:
        items:
          $ref: '#/definitions/sprout-backend_internal_domain.CreateJournalLine'
        minItems: 2
        type: array
      status:
        description: '"draft" or "posted"; defaults to "draft"'
        type: string
    required:
    - date
    - description
    - lines
    type: object
  sprout-backend_internal_domain.ReverseJournalRequest:
    properties:
      reason:
        type: string
    required:
    - reason
    type: object
  sprout-backend_internal_domain.UpdateAccountRequest:
    properties:
      balance:
        description: 'optional: adjusts balance via journal entry'
        type: number
      code:
        type: string
      name:
        type: string
    type: object
  sprout-backend_internal_domain.UpdateJournalRequest:
    properties:
      date:
        type: string
      description:
        type: string
      lines:
        description: if provided, replaces all lines
        items:
          $ref: '#/definitions/sprout-backend_internal_domain.CreateJournalLine'
        type: array
    type: object
host: localhost:8080
info:
  contact:
    email: engineering@sprout.co
    name: Sprout Engineering
  description: Backend API for Sprout Accounting — Chart of Accounts, General Journal,
    and AR Management.
  termsOfService: http://swagger.io/terms/
  title: Sprout Accounting API
  version: "1.0"
paths:
  /accounts:
    get:
      consumes:
      - application/json
      description: Retrieve a list of accounts with optional filtering
      parameters:
      - description: Search by code or name
        in: query
        name: search
        type: string
      - description: Filter by account type (asset, liability, equity, revenue, expense)
        in: query
        name: type
        type: string
      - description: Filter by parent account ID
        in: query
        name: parent_id
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 'data: []Account, count: int'
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Failed to retrieve accounts
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List accounts
      tags:
      - accounts
    post:
      consumes:
      - application/json
      description: Create a new account in the chart of accounts. Optionally set a
        starting balance.
      parameters:
      - description: Account data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/sprout-backend_internal_domain.CreateAccountRequest'
      produces:
      - application/json
      responses:
        "201":
          description: 'data: Account, message: string'
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Validation error or duplicate code
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Create a new account
      tags:
      - accounts
  /accounts/{id}:
    delete:
      description: Delete an account by ID. Cannot delete system accounts, control
        accounts, or accounts with children/journal references.
      parameters:
      - description: Account UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Account deleted successfully
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Cannot delete (system/children/referenced)
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Delete an account
      tags:
      - accounts
    get:
      description: Retrieve a single account by its UUID
      parameters:
      - description: Account UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 'data: Account'
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Account not found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get account by ID
      tags:
      - accounts
    put:
      consumes:
      - application/json
      description: Update an existing account's code, name, or balance. At least one
        field must be provided.
      parameters:
      - description: Account UUID
        in: path
        name: id
        required: true
        type: string
      - description: Fields to update
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/sprout-backend_internal_domain.UpdateAccountRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 'data: Account, message: string'
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Validation error
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Update an account
      tags:
      - accounts
  /accounts/tree:
    get:
      description: Returns the full chart of accounts as a hierarchical tree with
        rolled-up balances
      produces:
      - application/json
      responses:
        "200":
          description: 'data: []AccountTreeNode'
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Failed to retrieve account tree
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get account tree
      tags:
      - accounts
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticate a user and return a JWT token
      parameters:
      - description: Login credentials
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_handler.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handler.LoginResponse'
        "400":
          description: Invalid request body
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Failed to generate token
          schema:
            additionalProperties:
              type: string
            type: object
      summary: User login
      tags:
      - auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: Exchange an existing JWT token for a new one
      parameters:
      - description: Current token
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_handler.RefreshTokenRequest'
      produces:
      - application/json
      responses:
        "200":
          description: New token
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Invalid request body
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Failed to refresh token
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Refresh JWT token
      tags:
      - auth
  /health:
    get:
      description: Returns the current health status of the server
      produces:
      - application/json
      responses:
        "200":
          description: status, timestamp, uptime
          schema:
            additionalProperties: true
            type: object
      summary: Health check
      tags:
      - health
  /journals:
    get:
      description: Retrieve a paginated list of journal entries with optional filtering
      parameters:
      - description: Filter by status (draft, posted, reversed)
        in: query
        name: status
        type: string
      - description: Filter by source (manual, payment, opening_balance, adjustment)
        in: query
        name: source
        type: string
      - description: Filter from date (YYYY-MM-DD)
        in: query
        name: start_date
        type: string
      - description: Filter to date (YYYY-MM-DD)
        in: query
        name: end_date
        type: string
      - description: Page size (default 20)
        in: query
        name: limit
        type: integer
      - description: Offset (default 0)
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 'data: []JournalEntry, count: int, total: int'
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Failed to retrieve journal entries
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List journal entries
      tags:
      - journals
    post:
      consumes:
      - application/json
      description: Create a new manual journal entry with balanced debit/credit lines.
        Status can be "draft" or "posted".
      parameters:
      - description: Journal entry data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/sprout-backend_internal_domain.CreateJournalRequest'
      produces:
      - application/json
      responses:
        "201":
          description: 'data: JournalEntry, message: string'
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Validation error
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Create a new journal entry
      tags:
      - journals
  /journals/{id}:
    delete:
      description: Delete a journal entry. Only draft entries can be deleted.
      parameters:
      - description: Journal Entry UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Journal entry deleted successfully
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Not a draft
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Delete a draft journal entry
      tags:
      - journals
    get:
      description: Retrieve a single journal entry with its lines by UUID
      parameters:
      - description: Journal Entry UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 'data: JournalEntry (with lines)'
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Journal entry not found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get journal entry by ID
      tags:
      - journals
    put:
      consumes:
      - application/json
      description: Update the date, description, or lines of a draft journal entry.
        Only draft entries can be edited.
      parameters:
      - description: Journal Entry UUID
        in: path
        name: id
        required: true
        type: string
      - description: Fields to update
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/sprout-backend_internal_domain.UpdateJournalRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 'data: JournalEntry, message: string'
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Validation error or not a draft
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Update a draft journal entry
      tags:
      - journals
  /journals/{id}/post:
    post:
      description: Transition a draft journal entry to posted status. Entry must be
        balanced and have at least 2 lines.
      parameters:
      - description: Journal Entry UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 'data: JournalEntry, message: string'
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Not a draft or unbalanced
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Post a draft journal entry
      tags:
      - journals
  /journals/{id}/reverse:
    post:
      consumes:
      - application/json
      description: Create a reversing entry that swaps debit/credit of the original.
        Original entry is marked as reversed.
      parameters:
      - description: Journal Entry UUID
        in: path
        name: id
        required: true
        type: string
      - description: Reversal reason
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/sprout-backend_internal_domain.ReverseJournalRequest'
      produces:
      - application/json
      responses:
        "201":
          description: 'data: JournalEntry (reversing entry), message: string'
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Not posted or missing reason
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Reverse a posted journal entry
      tags:
      - journals
securityDefinitions:
  BearerAuth:
    description: Enter your bearer token in the format **Bearer &lt;token&gt;**
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
