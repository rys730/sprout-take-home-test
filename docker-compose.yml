version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: sprout-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sprout_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sprout-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sprout-backend
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=sprout_db
      - DB_SSLMODE=disable
      - SERVER_PORT=8080
      - SERVER_HOST=0.0.0.0
      - JWT_SECRET=your-secret-key-change-this-in-production
      - JWT_EXPIRATION_HOURS=24
      - ENV=development
      - CORS_ALLOWED_ORIGINS=http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sprout-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  sprout-network:
    driver: bridge
